<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日菜单 🏠</title>
    <style>
        :root {
            --primary-color: #7b2cbf;
            --background-color: #f8f9fa;
            --card-background: #ffffff;
            --text-color: #333333;
            --light-text: #666666;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            margin-top: 40px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .subtitle {
            color: var(--light-text);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        .menu-card {
            background: var(--card-background);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .order-item:last-child {
            border-bottom: none;
        }
        .dish-badge {
            font-size: 1.2rem;
            font-weight: 500;
        }
        .user-badge {
            background: #f3e8ff;
            color: var(--primary-color);
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: bold;
        }
        .no-orders {
            color: var(--light-text);
            font-size: 1.1rem;
        }
        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(123, 44, 191, 0.2);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(123, 44, 191, 0.3);
        }
        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 24px;
            max-width: 450px;
            width: 90%;
            text-align: left;
        }
        .modal-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #444;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .dish-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-height: 280px;
            overflow-y: auto;
            padding: 4px;
        }
        .dish-option {
            border: 1px solid #e0e0e0;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .dish-option.selected {
            border-color: var(--primary-color);
            background: #f3e8ff;
            color: var(--primary-color);
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 25px;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>今日菜单 🏠</h1>
        <div class="subtitle">好好做饭，好好吃饭，是家里最温暖的浪漫</div>

        <div class="menu-card" id="orders-container">
            <div class="no-orders">正在加载今日点菜情况...</div>
        </div>

        <button class="btn" onclick="openModal()">浏览点菜</button>
    </div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-title">你想吃什么？</div>
            
            <div class="form-group">
                <label>你是谁：</label>
                <select id="user-select">
                    <option value="爸爸">爸爸</option>
                    <option value="妈妈">妈妈</option>
                    <option value="大姐">大姐</option>
                    <option value="二姐">二姐</option>
                    <option value="阿祥">阿祥</option>
                    <option value="小不点">小不点</option>
                    <option value="阿健">阿健</option>
                </select>
            </div>

            <div class="form-group">
                <label>选择菜品：</label>
                <div class="dish-grid" id="dish-options-container">
                    </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn" onclick="submitOrder()">确定点菜</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🍳 核心配置①：【大厨菜单区】（已修复逗号丢失问题）
        // ==========================================
        const dishes = [
            { id: 1, name: '瓦煲上汤沙白', image: 'ShaBai.png' }, 
            { id: 2, name: '拍黄瓜', image: 'PaiHuangGua.png' }, 
            { id: 3, name: '麦片虾', image: 'MaiPianXia' }, 
            { id: 4, name: '清蒸石斑鱼', image: '' },
            { id: 5, name: 'ABC汤', image: '' },
            { id: 6, name: '马来风光', image: '' },
            { id: 7, name: '马铃薯焖猪肉', image: '' },
            { id: 8, name: '咸蛋苦瓜', image: '' },
            { id: 9, name: '菜干汤', image: '' },
            { id: 11, name: '酱油鸡', image: '' },
            { id: 12, name: '梅菜猪肉', image: '' },
            { id: 13, name: '媽蜜虾', image: '' },
            { id: 14, name: '咸鱼花腩煲', image: '' },
            { id: 15, name: '媽蜜鸡', image: '' },
            { id: 16, name: '酿豆腐', image: '' },
            { id: 17, name: '萝卜汤', image: '' },
            { id: 18, name: '四季豆煎蛋', image: '' },
            { id: 19, name: '水蛋', image: '' },
            { id: 20, name: '冬菜蒸猪肉', image: '' },
            { id: 21, name: '榨菜丝', image: '' },
            { id: 22, name: '土豆丝', image: '' },
            { id: 23, name: '番茄炒蛋', image: '' },
            { id: 24, name: '意大利面', image: '' },
            { id: 25, name: '炸薯条', image: '' },
            { id: 26, name: '芥菜', image: '' },
            { id: 27, name: '老黄瓜汤', image: '' },
            { id: 28, name: '西洋菜汤', image: '' },
            { id: 29, name: '酱蒸非洲鱼', image: '' },
            { id: 30, name: '沙丁鱼', image: '' },
            { id: 31, name: '药材汤', image: '' },
            { id: 32, name: '四大天王', image: '' }
        ];

        // ==========================================
        // 🔗 核心配置②：Google Apps Script 链接
        // ==========================================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbymzxZFF24ZYwDYfiPt2asy5QRpJEAnXeyU4snTvK4TbCYd-IpxWE3t-sDlmHkteRk/exec'; 

        let selectedDish = '';

        // 初始化网页
        window.onload = function() {
            renderDishOptions();
            fetchOrders();
        };

        // 渲染可选菜品列表（带图片版）
        function renderDishOptions() {
            const container = document.getElementById('dish-options-container');
            container.innerHTML = '';
            dishes.forEach(dish => {
                const div = document.createElement('div');
                div.className = 'dish-option';
                
                // 1. 判断是否有图片
                const imgHtml = dish.image ? `<img src="${dish.image}" style="width: 100%; height: 100px; object-fit: cover; border-radius: 8px; margin-bottom: 8px;">` : '';
                
                // 2. 拼接 HTML 结构
                div.innerHTML = `${imgHtml}<div>${dish.name}</div>`;
                
                div.onclick = function() {
                    document.querySelectorAll('.dish-option').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedDish = dish.name;
                };
                container.appendChild(div);
            });
        }

        // 获取今日已点菜品
        function fetchOrders() {
            if (GOOGLE_SCRIPT_URL.indexOf('你的_GOOGLE_WEB_APP_链接') !== -1) return;
            
            fetch(GOOGLE_SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('orders-container');
                    if (data.length === 0) {
                        container.innerHTML = '<div class="no-orders">今天还没有人点菜哦，快去“浏览点菜”点一盘吧！✨</div>';
                        return;
                    }
                    
                    let html = '';
                    data.forEach(item => {
                        html += '<div class="order-item"><span class="dish-badge">' + item.dish + '</span><span class="user-badge">' + item.name + '</span></div>';
                    });
                    container.innerHTML = html;
                })
                .catch(error => {
                    console.error('获取数据失败:', error);
                });
        }

        // 提交点菜数据
        function submitOrder() {
            const userName = document.getElementById('user-select').value;
            if (!selectedDish) {
                alert('请先选择你想吃的一道菜哦！');
                return;
            }

            if (GOOGLE_SCRIPT_URL.indexOf('你的_GOOGLE_WEB_APP_链接') !== -1) {
                alert('本地测试成功！\n' + userName + ' 点了 【' + selectedDish + '】');
                closeModal();
                return;
            }

            // 发送数据到谷歌后台
            fetch(GOOGLE_SCRIPT_URL + '?name=' + encodeURIComponent(userName) + '&dish=' + encodeURIComponent(selectedDish), {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    closeModal();
                    fetchOrders(); // 刷新列表
                }
            })
            .catch(error => {
                alert('点菜失败，请重试');
                console.error(error);
            });
        }

        function openModal() {
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
            document.querySelectorAll('.dish-option').forEach(el => el.classList.remove('selected'));
            selectedDish = '';
        }
    </script>
</body>
</html>
